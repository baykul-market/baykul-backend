name: Deploy to beget.com server

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      TARGET_HOST: ${{ secrets.HOST_PROD }}
      CONTAINER_NAME: baykul-backend-prod
      BACKEND_PORT: ${{ vars.BACKEND_PORT || '8080' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Get Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: REGISTRY,IMAGE_NAME,SHORT_SHA,CONTAINER_NAME,BACKEND_PORT,GITHUB_TOKEN
          script: |
            set -e
            echo "$GITHUB_TOKEN" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin
            FULL_IMAGE_NAME=$(echo "$REGISTRY/$IMAGE_NAME:sha-$SHORT_SHA" | tr '[:upper:]' '[:lower:]')
            echo "Pulling image: $FULL_IMAGE_NAME"
            docker pull $FULL_IMAGE_NAME
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true
            
            docker run -d \
              --name $CONTAINER_NAME \
              --network baykul-network \
              -p $BACKEND_PORT:8080 \
              --restart always \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DATABASE_URL=jdbc:postgresql://baykul-postgres:5432/baykul \
              -e DATABASE_USER=${{ secrets.POSTGRES_USER }} \
              -e DATABASE_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }} \
              -e JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }} \
              -e SECURITY_USER_PASSWORD=${{ secrets.SECURITY_USER_PASSWORD }} \
              -v /root/baykul-backend-prod/logs:/app/logs \
              -v /root/bakul-backend-prod/uploads:/app/uploads \
              $FULL_IMAGE_NAME

            docker image prune -af --filter "until=24h" || true

            sleep 5
            if docker ps | grep -q $CONTAINER_NAME; then
              echo "✅ Container $CONTAINER_NAME started successfully"
              echo "📝 Logs: docker logs $CONTAINER_NAME"
            else
              echo "❌ Container failed to start"
              docker logs $CONTAINER_NAME
              exit 1
            fi