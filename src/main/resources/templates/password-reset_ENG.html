<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333; line-height: 1.6; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: auto; background-color: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);">
        <h2 style="color: #2196F3; border-bottom: 2px solid #f4f4f4; padding-bottom: 10px;">Password Reset</h2>
        
        <p>Hello <span th:text="${login}">User</span>,</p>
        <p>Your password has been successfully reset. Please use the following temporary password to log in:</p>
        
        <div style="background-color: #e3f2fd; padding: 15px; text-align: center; font-size: 1.2em; font-weight: bold; color: #1976d2; margin: 20px 0; border-radius: 4px;">
            <span th:text="${newPassword}">TEMPPASS123</span>
        </div>
        
        <p>For security reasons, we recommend that you change this temporary password immediately after logging in.</p>
        
        <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 10px; font-size: 0.9em; color: #777;">
            <p>Best regards,<br/>Baykul Market System</p>
        </div>
    </div>
</body>
</html>
