<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmation</title>
</head>
<body>
<h2>Hello, <span th:text="${userName}">User</span>!</h2>
<p>Your order #<span th:text="${orderNumber}">123456</span> from <span th:text="${orderDate}">01/01/2024</span> is awaiting confirmation.</p>

<h3>Order Details:</h3>
<p><strong>Status:</strong> Awaiting confirmation</p>
<p><strong>Order Total:</strong> <span th:text="${totalAmount}">0.00 RUB</span></p>

<p>We will contact you shortly to confirm your order.</p>

<a th:href="${url}" style="display: inline-block; padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px;">
    View Order
</a>

<hr>
<p style="color: #666; font-size: 12px;">
    This is an automated message, please do not reply.<br>
    © Baykul Marketplace
</p>
</body>
</html>
