<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Cancelled</title>
</head>
<body>
<h2>Hello, <span th:text="${userName}">User</span>!</h2>
<p>Order #<span th:text="${orderNumber}">123456</span> has been cancelled.</p>

<p><strong>Status:</strong> Cancelled</p>
<p th:text="${cancellationMessage}">If you didn't cancel the order, please contact support</p>

<a th:href="${url}" style="display: inline-block; padding: 10px 20px; background-color: #dc3545; color: white; text-decoration: none; border-radius: 5px;">
    Place New Order
</a>

<hr>
<p style="color: #666; font-size: 12px;">© Baykul Marketplace</p>
</body>
</html>
