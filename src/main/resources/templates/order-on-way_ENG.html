<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order on the Way</title>
</head>
<body>
<h2>Hello, <span th:text="${userName}">User</span>!</h2>
<p>Your order #<span th:text="${orderNumber}">123456</span> is on the way!</p>

<h3>Delivery Information:</h3>
<p><strong>Status:</strong> On the way</p>
<p th:text="${trackingInfo}">Track your order in your personal account</p>

<a th:href="${url}" style="display: inline-block; padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px;">
    Track Order
</a>

<hr>
<p style="color: #666; font-size: 12px;">© Baykul Marketplace</p>
</body>
</html>
