<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New User Registration</title>
</head>
<body style="font-family: Arial, sans-serif; color: #333; line-height: 1.6; background-color: #f4f4f4; padding: 20px;">
    <div style="max-width: 600px; margin: auto; background-color: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);">
        <h2 style="color: #4CAF50; border-bottom: 2px solid #f4f4f4; padding-bottom: 10px;">New User Registration</h2>
        
        <p>Hello Admin,</p>
        <p>A new user has just registered in the system and is currently blocked awaiting your approval.</p>
        
        <h3 style="margin-top: 20px; color: #555;">User Details:</h3>
        <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
            <tr>
                <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold; width: 30%;">Login:</td>
                <td style="padding: 8px; border: 1px solid #ddd;"><span th:text="${login}">login</span></td>
            </tr>
            <tr>
                <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Email:</td>
                <td style="padding: 8px; border: 1px solid #ddd;"><span th:text="${email}">email</span></td>
            </tr>
            <tr>
                <td style="padding: 8px; border: 1px solid #ddd; font-weight: bold;">Phone:</td>
                <td style="padding: 8px; border: 1px solid #ddd;"><span th:text="${phone}">phone</span></td>
            </tr>
        </table>
        
        <p style="margin-top: 20px;">Please log in to the admin panel to review and unblock this user.</p>
        
        <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 10px; font-size: 0.9em; color: #777;">
            <p>Best regards,<br/>Baykul Market System</p>
        </div>
    </div>
</body>
</html>
