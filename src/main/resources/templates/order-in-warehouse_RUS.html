<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Заказ на складе</title>
</head>
<body>
<h2>Здравствуйте, <span th:text="${userName}">Пользователь</span>!</h2>
<p>Ваш заказ №<span th:text="${orderNumber}">123456</span> прибыл на наш склад.</p>

<p><strong>Статус:</strong> На складе</p>
<p>Скоро мы передадим его в службу доставки.</p>

<a th:href="${url}" style="display: inline-block; padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px;">
    Подробнее
</a>

<hr>
<p style="color: #666; font-size: 12px;">© Baykul Marketplace</p>
</body>
</html>
