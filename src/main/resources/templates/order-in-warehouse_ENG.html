<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order in Warehouse</title>
</head>
<body>
<h2>Hello, <span th:text="${userName}">User</span>!</h2>
<p>Your order #<span th:text="${orderNumber}">123456</span> has arrived at our warehouse.</p>

<p><strong>Status:</strong> In warehouse</p>
<p>We will soon hand it over to the delivery service.</p>

<a th:href="${url}" style="display: inline-block; padding: 10px 20px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px;">
    Details
</a>

<hr>
<p style="color: #666; font-size: 12px;">© Baykul Marketplace</p>
</body>
</html>
